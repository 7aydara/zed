<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/icon.png">
    <title>Zed - Agent Desktop</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/icon.png" alt="Zed" style="width: 32px; height: 32px; border-radius: 8px;">
            <div class="status-indicator" id="status-indicator"></div>
            <h1>ZED Core Interface</h1>
        </div>
        
        <div class="visualizer-container">
            <div class="orb" id="orb"></div>
        </div>

        <div class="chat-history" id="chat-history"></div>

        <div class="input-container">
            <input type="text" id="chat-input" placeholder="Type a message to Zed..." autocomplete="off">
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
